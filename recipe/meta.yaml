{% set name = "topometry" %}
{% set version = "1.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/topometry-{{ version }}.tar.gz
  sha256: 73b16ffc9939794a56cfb06ad4c8657424c6a4237c6b0ea6c0b4c35e48c3da27

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.6
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >=3.6
    - numpy
    - scipy
    - scikit-learn
    - matplotlib-base
    - pandas
    - numba
    - setuptools

test:
  imports:
    - topo
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/davisidarta/topometry
  summary: A comprehensive dimensional reduction framework to recover latent information from data.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mfansler
